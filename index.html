<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibrahim Adam | Healthcare Data Analyst CV</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .cv-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 5px solid #0077b5; object-fit: cover; margin-bottom: 10px; }
        h1 { color: #2c3e50; margin: 10px 0; font-size: 1.8em; }
        h2 { color: #0077b5; font-size: 1.1em; font-weight: 500; margin-bottom: 20px; }
        .info-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 25px; text-align: left; font-size: 0.9em; color: #555; }
        .btn { background: #0077b5; color: white; padding: 15px 30px; text-decoration: none; border-radius: 50px; display: inline-block; font-weight: bold; transition: all 0.3s ease; border: none; cursor: pointer; width: 100%; font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,119,181,0.3); }
        .btn:hover { background: #005582; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,119,181,0.4); }
        .links { margin-top: 20px; }
        .links a { color: #777; text-decoration: none; margin: 0 10px; font-size: 0.9em; }
        .links a:hover { color: #0077b5; }
    </style>
</head>
<body>

<div class="cv-card">
    <img src="https://github.com/ibrahim121adam.png" alt="Ibrahim Adam" class="profile-img">
    <h1>Ibrahim Adam</h1>
    <h2>Healthcare Data Analyst | Ex-Nurse</h2>
    
    <div class="info-box">
        <strong>Skills:</strong> SQL, Power BI, Python, Clinical Insights.<br>
        <strong>Based in:</strong> Ajman, UAE 🇦🇪
    </div>

    <button class="btn" onclick="downloadCV()">⬇️ Download My CV (PDF)</button>

    <div class="links">
        <a href="https://linkedin.com/in/ibrahim121adam">LinkedIn</a> • 
        <a href="https://github.com/ibrahim121adam">GitHub</a>
    </div>
</div>

<script>
    function downloadCV() {
        // هذا الرابط سيعمل بعد أن ترفع ملف الـ PDF للمستودع بنفس الاسم
        const cvUrl = 'https://raw.githubusercontent.com/ibrahim121adam/cv-repo/main/Ibrahim_Adam_CV.pdf';
        
        const link = document.createElement('a');
        link.href = cvUrl;
        link.download = 'Ibrahim_Adam_CV.pdf';
        document.body.appendChild(link);
        link.click();    
        document.body.removeChild(link);
        
        alert('جاري تحميل السيرة الذاتية.. بالتوفيق يا إبراهيم!');
    }
</script>

</body>
</html>
